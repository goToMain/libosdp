name: Reusable CI

on:
  workflow_call:

jobs:
  Changelog:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Validate changelog files
      run: python3 scripts/changelog_tool.py validate --dir CHANGELOG --quiet

  CmakeBuild:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Configure
      run: cmake -DCMAKE_BUILD_TYPE=Debug .
    - name: Build
      run: cmake --build . --parallel 7 --target all --target cpp_cp_sample --target cpp_pd_sample
    - name: Package
      run: cmake --build . --target package --target package_source
    - uses: actions/upload-artifact@v6
      with:
        name: libosdp-ubuntu-latest-binaries.zip
        path: artifacts/

  MakeBuild:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: configure
      run: ./configure.sh
    - name: make
      run: make V=1
    - name: make check
      run: make V=1 check

  DocBuild:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y doxygen
        pip3 install -r doc/requirements.txt
    - name: Configure
      run: cmake -DCMAKE_BUILD_TYPE=Debug .
    - name: Build docs
      run: cmake --build . --parallel 7 --target html_docs

  Test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Configure
      run: cmake -DCMAKE_BUILD_TYPE=Debug .
    - name: Run unit-tests
      run: cmake --build . --parallel 7 --target check

  CheckPatch:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: ClangFormatCheck
      run: ./scripts/clang-format-check.sh

  Python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install pypa/build
        run: python3 -m pip install build --user
      - name: Build a binary wheel and a source tarball
        run: python3 -m build python
      - name: Store the distribution packages
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: python/dist/

  PlatformIO:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        examples:
          - examples/platformio/cp.ino
          - examples/platformio/pd.ino
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio
      - name: Build PlatformIO examples
        run: pio ci --verbose --lib . --board=megaatmega2560 ${{ matrix.examples }}

  # MSVC covers the libosdp core (src/) only — CMakeLists.txt gates utils/,
  # unit-tests, and examples behind `NOT MSVC` because utils/ relies on POSIX
  # APIs and GNU C extensions that MSVC does not provide.
  WindowsMSVC:
    name: Windows MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug .
      - name: Build
        run: cmake --build build --config Debug --parallel

  # MSYS2 toolchains are GCC/Clang-like on Windows. They do NOT define
  # _MSC_VER, so CMake treats them as non-MSVC and builds the full tree
  # (utils/, unit-tests, examples). This is what catches portability issues
  # like goToMain/c-utils#36 where utils/ used MSVC-only intrinsics behind
  # a plain `defined(_WIN32)` guard.
  WindowsMSYS2:
    name: Windows ${{ matrix.name }}
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MinGW64 GCC
            msystem: MINGW64
            packages: >-
              mingw-w64-x86_64-gcc
              mingw-w64-x86_64-cmake
              mingw-w64-x86_64-ninja
          - name: UCRT64 GCC
            msystem: UCRT64
            packages: >-
              mingw-w64-ucrt-x86_64-gcc
              mingw-w64-ucrt-x86_64-cmake
              mingw-w64-ucrt-x86_64-ninja
          - name: CLANG64 Clang
            msystem: CLANG64
            packages: >-
              mingw-w64-clang-x86_64-clang
              mingw-w64-clang-x86_64-cmake
              mingw-w64-clang-x86_64-ninja
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          cache: true
          install: ${{ matrix.packages }}
      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug .
      - name: Build
        run: cmake --build build --parallel
      - name: Run unit-tests
        run: cmake --build build --target check --parallel
